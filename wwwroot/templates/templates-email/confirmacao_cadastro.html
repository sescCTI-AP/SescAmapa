<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Sistema de Boletos</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <style>
        .box-email {
            border: 1px solid #e2e2e2;
            border-radius: 3px;
        }

        .box-email-header {
            border-bottom: 1px solid #e2e2e2;
            padding: 15px;
        }

        .box-email-body {
            padding: 5px 25px 25px 25px;
        }

        .box-email-footer {
            background-color: #00468b;
            color: #ffffff;
            border-bottom-left-radius: 3px;
            border-bottom-right-radius: 3px;
            padding: 5px 15px 15px 15px;
            font-size: 0.8em;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <br>
    <div class="container">
        <div class="box-email">
            <div class="box-email-header">
                <img src="https://sesc-pa.com.br/img/logo/logo-sesc.png" width="75" alt="logo-sesc" />
                <p style="font-size: 0.9em; font-weight: 400; margin-bottom: 0; margin-top: 20px; margin-left:10px; color: #00468b">
                    Pará
                </p>
            </div>
            <div class="box-email-body">
                <p style="font-size: 2em; font-weight: 500; margin-bottom: 8px; text-transform: capitalize;">
                    Olá, <span>[[nomeCliente]]</span>
                </p>
                <p style="font-size: 1.5em; margin: 0">
                    Obrigado por se cadastrar para acesso ao site Sesc Pará.
                    <a href="https://sesc-pa.com.br/usuario/ativar-usuario/[[guid]]">
                        Clique aqui
                    </a> para finalizar o cadastro.
                </p>
            </div>
            <div class="box-email-footer">
                <p style="font-size: 1.2em; margin-bottom: 5px">
                    &copy; Site Sesc - Desenvolvido por ASTI SESC PA <br>
                </p>
                Não responda a este email
            </div>
        </div>
    </div>
</body>
</html>
